---
# cloudia-4man (c4m) shutdown
# 
# further readings:
# - https://stackoverflow.com/questions/45301295/ansible-task-serial-1-reverse-order
- name: Check cloudia-4man requirements
  hosts: all
  pre_tasks:
    - name: Verify Ansible is version 2.11 or above. (If this fails you may need to update Ansible)
      ansible.builtin.assert:
        that: ansible_version.full is version_compare('2.11', '>=')
        msg: >
          "Ansible is out of date. See here for more info: https://docs.technotim.live/posts/ansible-automation/"

- hosts: k3s_agents
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  gather_facts: true
  tasks:
    - name: Shutdown K3s agents
      ansible.builtin.include_role:
        name: k3s_agent
        tasks_from: shutdown.yaml
    - name: Shutdown OS of K3s agents
      ansible.builtin.include_role:
        name: os_basic
        tasks_from: shutdown.yaml

- hosts: k3s_servers
  order: reverse_inventory
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  serial: 1
  gather_facts: true
  tasks:
    - name: Shutdown K3s servers
      ansible.builtin.include_role:
        name: k3s_server
        tasks_from: shutdown.yaml
    - name: Shutdown OS of K3s servers
      ansible.builtin.include_role:
        name: os_basic
        tasks_from: shutdown.yaml

#- import_playbook: plain.yaml
- hosts: plain_servers
  gather_facts: true
  # become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  tasks:
    - name: Shutdown OS of plain_servers
      ansible.builtin.include_role:
        name: os_basic
        tasks_from: shutdown.yaml

