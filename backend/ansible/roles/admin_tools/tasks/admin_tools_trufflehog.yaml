---
# trufflehog: https://github.com/trufflesecurity/trufflehog
# curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin <ReleaseTag like v3.56.0>
- name: "tool trufflehog"
  when: _admin_tool.version != 'none'
  block:
    - name: "trufflehog: prepare environment"
      ansible.builtin.file:
        path: "/tmp/trufflehog"
        state: directory
    - name: "trufflehog: downloading install script"
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh"
        dest: "/tmp/trufflehog"
    - name: "trufflehog: installing binaries"
      ansible.builtin.command:
        cmd: "./install.sh -b /usr/local/bin {{ _admin_tool.version }}"
      args:
        chdir: "/tmp/trufflehog"
      become: true
  
