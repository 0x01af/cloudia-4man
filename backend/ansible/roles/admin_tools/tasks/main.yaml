---
# Role: admin_node
# supported operating systems:
# - Ubuntu
- name: "Assert that the general default parameters for the role have been defined."
  ansible.builtin.assert:
    that:
      - admin_tools is not falsy
    fail_msg: "role admin_node: parameter admin_tools is not defined!"

- name: "Iterate through admin tools"
  include_tasks: 
    file: "admin_tools_{{ item.name }}.yaml"
  loop: "{{ admin_tools }}"
  loop_control:
    loop_var: item
    label: "{{ item.name }} ({{ item.version }})"
  vars:
    _admin_tool: "{{ item }}"


# change sudoers
# sudo: ALL=(ALL) NOPASSWD:ALL



- name: "tool k8sgpt"
  when: admin_tools.k8sgpt is defined and admin_tools.k8sgpt.version is defined and admin_tools.k8sgpt.version != 'none'
  block:
    - name: "downloading binaries"
      ansible.builtin.get_url:
        url: "https://github.com/k8sgpt-ai/k8sgpt/releases/download/{{ admin_tools.k8sgpt.version }}/k8sgpt_Linux_x86_64.tar.gz"
        dest: "/tmp/k8sgpt_Linux_x86_64.tar.gz"
    - name: "extracting binaries (tar -xzf k8sgpt_Linux_x86_64.tar.gz)"
      ansible.builtin.unarchive:
        src: "/tmp/k8sgpt_Linux_x86_64.tar.gz"
        dest: "/tmp/k8sgpt"
        remote_src: yes
    - name: "installing binaries"
      ansible.builtin.copy:
        src: "/tmp/k8sgpt/k8sgpt"
        dest: "/usr/local/bin/k8sgpt"
      become: true
  # Original Source: https://github.com/k8sgpt-ai/k8sgpt/releases/download/v0.4.27/k8sgpt_Linux_x86_64.tar.gz
