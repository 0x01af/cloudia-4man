---
# inspired by https://earlruby.org/2019/07/rebooting-a-host-with-ansible/
- name: 'c4m_commons:os-restart-and-wait'
  ansible.builtin.reboot:
    msg: 'cloudia-4man: Reboot initiated'
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: whoami
  become: true
  become_method: sudo
