---
# inspired by https://earlruby.org/2019/07/rebooting-a-host-with-ansible/
- name: 'c4m:os_basic:restart-and-wait'
  ansible.builtin.reboot:
    msg: 'cloudia-4man: Reboot initiated'
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: whoami

- name: 'c4m:os_basic:netplan-apply'
  ansible.builtin.command: netplan apply
  become: yes
  become_method: sudo
