---
# Set NTP servers (chrony)
# - https://discourse.ubuntu.com/t/improving-chrony-time-source-configuration-in-ubuntu/47850
# - https://discourse.ubuntu.com/t/ntp-server-should-point-to-a-local-ntp-server/78601/13
# - https://oneuptime.com/blog/post/2026-02-21-ansible-configure-ntp-servers/view
- name: Deploy chrony configuration
  ansible.builtin.template:
    src: os-basic-ubuntu-chrony.conf.j2
    dest: /etc/chrony/sources.d/10-os-basic-ubuntu-26-04.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Restart chrony
