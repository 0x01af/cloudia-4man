---
- name: 'Clean-up cloud-init configuration'
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent
  become: yes

- name: 'Template out Netplan YAML to configure networking'
  ansible.builtin.template:
    src: ../templates/os-basic-netplan.yaml.j2
    dest: /etc/netplan/10-os-basic-network.yaml
  become: yes

- name: 'Applying Netplan Configuration'
  ansible.builtin.command: netplan apply
  become: yes
  become_method: sudo

# SYSTEM AND PACKAGE UPDATES
# "sudo apt-get update -y",
# "sudo apt-get upgrade -y",
# "sudo apt-get dist-upgrade -y",
# "sudo apt --fix-broken install -y",
# further information:
# - https://itsfoss.com/apt-get-linux-guide/
# - https://adamtheautomator.com/ansible-apt/
# proof needed:
# sudo apt install unattended-upgrades
# sudo dpkg-reconfigure unattended-upgrade
- name: 'Upgrade the OS (apt-get dist-upgrade)'
  ansible.builtin.apt:
    upgrade: dist
    update_cache: yes
  become: yes
  notify: c4m:os_basic:restart-and-wait

- name: 'Install (or remove) default packages'
  ansible.builtin.apt:
    update_cache: yes
    autoremove: yes
    state: present
    pkg:
      - curl
      - vim
  become: yes

- name: 'Update all packages to latest versions'
  ansible.builtin.apt:
    name: "*"
    state: latest
    update_cache: yes
    autoremove: yes
  become: yes

# apt-get clean: clean up disk space - https://www.tecmint.com/useful-basic-commands-of-apt-get-and-apt-cache-for-package-management/
