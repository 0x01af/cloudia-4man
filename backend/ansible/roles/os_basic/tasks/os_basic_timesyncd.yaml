---
# Set NTP servers (systemd-timesyncd)
- name: 'Ensure drop-in directory timesyncd.conf.d exists'
  ansible.builtin.file:
    path: /etc/systemd/timesyncd.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
- name: 'Configure timesyncd based on settings'
  ansible.builtin.template:
    src: os-basic-timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf.d/10-os-basic-ubuntu-24-04-timesyncd.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
- name: 'Restart systemd-timesyncd'
  ansible.builtin.service:
    name: systemd-timesyncd
    state: restarted
