---
# Role: os_basic
# supported operating systems:
# - Ubuntu

- name: 'Change time zone'
  community.general.timezone:
    name: "{{ os_local.time_zone }}"
  register: _os_local_time

- name: 'Restart all time-dependent services'
  when: _os_local_time.changed
  ansible.builtin.include_role:
    name: c4m_commons
    tasks_from: timedependent_services_restart

- name: 'Change keyboard layout'
  become: yes
  ansible.builtin.template:
    src: os-basic-keyboard.j2
    dest: /etc/default/keyboard
    force: yes
    owner: root
    group: root
    mode: 'u=rw,go=r'

# change sudoers
# sudo: ALL=(ALL) NOPASSWD:ALL

# add public key to authorized keys:
# ssh_authorized_keys:
# - ssh-rsa  oso@snarloso

- name: 'os_basic tasks for Debian OS family (Debian/Ubuntu)'
  when: ansible_os_family|lower == 'debian'
  include_tasks: os_basic_family_debian.yaml

# - name: 'os_basic tasks for Red Hat OS family (RHEL/CentOS/Fedora/Rocky Linux/AlmaLinux)'
#  when: ansible_os_family|lower == 'redhat'

# - name: 'os_basic tasks for SUSE family (SLES/openSUSE)'
#  when: ansible_os_family|lower == 'suse'

- name: 'os_basic tasks for service timesyncd'
  when: ansible_distribution|lower == 'ubuntu' and ansible_distribution_version == '24.04'
  include_tasks: os_basic_timesyncd.yaml
- name: 'os_basic tasks for service chrony'
  when: ansible_distribution|lower == 'ubuntu' and (ansible_distribution_version == '25.10' or ansible_distribution_version == '26.04')
  # => chrony: Red Hat Enterprise Linux (RHEL) 7, 8, 9+; Fedora; Rocky Linux / AlmaLinux 8, 9, 10
  # => chrony: SUSE Linux Enterprise Server (SLES) 15+
  include_tasks: os_basic_chrony.yaml
