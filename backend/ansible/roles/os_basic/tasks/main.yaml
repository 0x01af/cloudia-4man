---
# Role: os_basic
# supported operating systems:
# - Ubuntu

- name: 'Change time zone'
  community.general.timezone:
    name: "{{ os_basic.time_zone }}"
- name: 'Restart time-dependent services'
  ansible.builtin.service:
    name: cron
    state: restarted

- name: 'Change keyboard layout'
  become: yes
  ansible.builtin.template:
    src: os-basic-keyboard.j2
    dest: /etc/default/keyboard
    force: yes
    owner: root
    group: root
    mode: 'u=rw,go=r'

# change sudoers
# sudo: ALL=(ALL) NOPASSWD:ALL

# add public key to authorized keys:
# ssh_authorized_keys:
# - ssh-rsa  oso@snarloso

- name: 'os_basic tasks for OS family Debian (Debian/Ubuntu)'
  import_tasks: os_basic_family_debian.yaml
  when: ansible_facts['os_family']|lower == 'debian'

