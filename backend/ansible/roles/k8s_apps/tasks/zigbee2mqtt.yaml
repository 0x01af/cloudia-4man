- name: "k8s_app zigbee2mqtt"
  when: _k8s_app.version != 'none'
  block:
    - name: "deploy prerequisites of zigbee2mqtt"
      kubernetes.core.k8s:
        state: present
        template: 'zigbee2mqtt-prerequisites.yaml.j2'
    - name: "set label for node affinity"
      when: _k8s_app.serial is defined and _k8s_app.serial.attached_to is defined
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Node
          metadata:
            name: "{{ _k8s_app.serial.attached_to }}"
            labels:
              app-preferred: zigbee2mqtt
        state: present
    - name: "deploy zigbee2mqtt"
      kubernetes.core.k8s:
        state: present
        template: 'zigbee2mqtt.yaml.j2'
      register: _zigbee2mqtt_deployment
    - name: "force pod recreation via Rollout (Clean Sledgehammer)"
      when: _zigbee2mqtt_deployment.changed
      kubernetes.core.k8s:
        definition:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: zigbee2mqtt-app
            namespace: "{{ _k8s_app.namespace | default('zigbee2mqtt') }}"
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
        state: patched
    - name: "configure ingress for zigbee2mqtt"
      kubernetes.core.k8s:
        state: present
        template: 'zigbee2mqtt-ingress.yaml.j2'
