---
- name: "Assert that the general default parameters for the role have been defined."
  ansible.builtin.assert:
    that:
      - k8s_apps is not falsy
    fail_msg: "role k8s_apps: general default parameters are not defined!"

#- name: "Check release trains for all K8s Apps"
#  block:
#    - name: Get latest release of a public repository
#      community.general.github_release:
#        user: ansible
#        repo: ansible
#        action: latest_release

- name: "Identify current ingress controller for K8s applications"
  block:
    - name: "Get all ingress controller"
      kubernetes.core.k8s_info:
        kind: IngressClass
      register: _k8s_ingress_controllers
    - name: Sortiere IngressClasses (Default zuerst)
  set_fact:
    sorted_ingress_classes: >-
      {% set defaults = _k8s_ingress_controllers.resources 
        | selectattr('metadata.annotations', 'defined') 
        | selectattr('metadata.annotations["ingressclass.kubernetes.io/is-default-class"]', 'defined') 
        | selectattr('metadata.annotations["ingressclass.kubernetes.io/is-default-class"]', 'equalto', 'true') 
        | list %}
      {% set others = all_ingress_classes.resources 
        | rejectattr('metadata.name', 'in', defaults | map(attribute='metadata.name') | list) 
        | list %}
      {{ defaults + others }}

- name: Speichere den ersten Eintrag als Fact
  set_fact:
    primary_ingress_class: "{{ sorted_ingress_classes | first | default(none) }}"
    - name: "Select first ingress controller (typically the default controller)"
      set_fact:
        _k8s_ingress_detected: "{{ _k8s_ingress_controllers.resources | sortattr('metadata.annotations["ingressclass.kubernetes.io/is-default-class"]', 'defined') | map(attribute='metadata.name') | first | default('none') }}"
    - name: "Warn user, if no ingress has been detected"
      when: _k3s_ingress_detected = 'none'
      debug:
        msg: >-
          WARNING: No K8s ingress controller has been detected!
          If any K8s application needs an ingress controller, than deployment will fail.

- name: "Iterate through K8s applications"
  include_tasks: "{{ _k8s_app.name }}.yaml"
  loop: "{{ k8s_apps }}"
  loop_control:
    loop_var: _k8s_app
    label: "{{ _k8s_app.name }} ({{ _k8s_app.version }})"
