---
- name: "Assert that overall defaults of role has been set."
  ansible.builtin.assert:
    that:
      - k8s_apps is not none

- name: "k8s_app kubernetes-reflector"
  when: k8s_apps.kubernetes-reflector is defined and k8s_apps.kubernetes-reflector.version is defined and k8s_apps.kubernetes-reflector.version != 'none'
  import_tasks: kubernetes-reflector.yaml
