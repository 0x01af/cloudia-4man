---

- name: Deploy Longhorn via Helm
  hosts: k3s_servers
  become: no # Or yes, depending on your Kubeconfig setup and permissions
  # vars:
  #  longhorn_version: "1.6.2" # Check Longhorn's official documentation for the latest stable version
  #  longhorn_helm_repo_name: longhorn
  #  longhorn_helm_repo_url: 
  tasks:
    - name: Ensure kubernetes.core collection is installed
      ansible.galaxy_collection:
        name: kubernetes.core
        state: present
    - name: Add Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: "longhorn"
        repo_url: "https://charts.longhorn.io"
    - name: Update Helm repositories
      kubernetes.core.helm_repository:
        name: "longhorn"
        repo_url: "https://charts.longhorn.io"
        force_update: yes
    - name: Install Longhorn Helm chart
      kubernetes.core.helm:
        name: longhorn
        chart_ref: "longhorn/longhorn"
        release_namespace: longhorn-system
        create_namespace: yes
        release_state: present
        kubeconfig: "~/.kube/config" # Path to your Kubeconfig file
        values:
          defaultSettings:
            replicaAutoBalance: "least-effort" # Example setting, customize as needed
            createDefaultDiskAndNode: true
          # Add any other custom values from Longhorn's values.yaml
          # persistence:
          #   defaultClass: true
          #   defaultFsType: ext4
          #   storageclass:
          #     reclaimPolicy: Retain
