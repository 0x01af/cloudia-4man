---
# k3s_components:kube-vip:tasks
# based on: https://kube-vip.io/docs/usage/k3s/
#
- name: If K3s manifest folder does not exist, create K3s manifest folder
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    mode: "0755"

### Prepare configuration to use kube-vip for control-plane
# CONDITION: Environment defines the usage of kube-vip for control-plane
- name: Prepare configuration to use kube-vip for control-plane
  when: not ansible_check_mode and (k3s.api.loadbalancer == "kube-vip")
  block:
    - name: Download kube-vip RBAC manifest
      ansible.builtin.get_url:
        url: https://kube-vip.io/manifests/rbac.yaml
        timeout: 120
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip-rbac.yaml
        owner: root
        group: root
        mode: "0755"

### Prepare configuration to use kube-vip for service load balancing
# CONDITION: Environment defines the usage of kube-vip for service load balancing
- name: Prepare configuration to use kube-vip for service load balancing
  when: not ansible_check_mode and (k3s.loadbalancer.use == "kube-vip")
  block:
    - name: Download kube-vip RBAC manifest
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/kube-vip/kube-vip-cloud-provider/main/manifest/kube-vip-cloud-controller.yaml
        timeout: 120
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip-cloud-controller.yaml
        owner: root
        group: root
        mode: "0755"
    
    - name: Prevent configuration of K3s load balancer servicelb
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/server/manifests/servicelb.yaml.skip
        state: touch
