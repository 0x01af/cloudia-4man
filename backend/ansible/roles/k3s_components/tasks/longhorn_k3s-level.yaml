- name: 'deploy app'
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/longhorn/longhorn/{{ k3s.storage.longhorn.version }}/deploy/longhorn.yaml"
- name: 'deploy secret'
  kubernetes.core.k8s:
    state: present
    template: 'longhorn-ingress-secret.yaml.j2'
  no_log: true

# Configure Longhorn UI Ingress
kubectl -n longhorn-system apply -f ./longhorn-ui-ingress-traefik.yaml

