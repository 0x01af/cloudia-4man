---

# Download right k3s version
# inspired by: https://github.com/PyratLabs/ansible-role-k3s/blob/main/tasks/build/get-version.yml

# ENABLE CONTAINER FEATURES
# "echo ' cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1' | sudo tee -a /boot/firmware/cmdline.txt",

# 
- name: Ensure the default release channel is set
  ansible.builtin.set_fact:
    k3s.release_channel: "{{ k3s.release_version | default('stable') }}"
  check_mode: false

# LATEST
- name: Get the latest release version from k3s.io
  ansible.builtin.uri:
    url: "{{ k3s_api_releases }}"
    return_content: true
    body_format: json
  register: k3s_latest_release
  no_log: true
  check_mode: false

- name: Ensure the release version is set as a fact
  ansible.builtin.set_fact:
    k3s_release_version: "{{ item.latest }}"
  loop: "{{ k3s_latest_release.json.data }}"
  check_mode: false
  when:
    - item.name == k3s_release_channel
    - item.type == "channel"


- task: 'Check variable k3s.version about keyword'

