---
# k3s_server:tasks
# inspired by: https://github.com/k3s-io/k3s-ansible/blob/master/roles/k3s_server/tasks/main.yml
#
# other discussed options:
# - Download and installation: https://github.com/PyratLabs/ansible-role-k3s/blob/main/tasks/build/get-version.yml
- name: Retrieve installed k3s version
  ansible.builtin.command: k3s --version
  register: _cmd_k3s_version_output
  changed_when: false
  ignore_errors: true

- name: Store installed k3s version as additional fact
  when: not ansible_check_mode and _cmd_k3s_version_output.rc == 0
  ansible.builtin.set_fact:
    k3s: "{{ k3s | ansible.builtin.combine({'version_installed': '{{ _cmd_k3s_version_output.stdout_lines[0].split(' ')[2] }}'}) }}"
    # https://docs.ansible.com/ansible/latest/collections/ansible/builtin/combine_filter.html#ansible-collections-ansible-builtin-combine-filter
    # k3s: "{{ k3s | merge({'version_installed': '{{ _cmd_k3s_version_output.stdout_lines[0].split(' ')[2] }}'}) }}"

### Prepare OS and HW for K3s
- name: Prepare system for K3s
  when: k3s.version_installed is undefined
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  block:
    - name: Create logical volume on system disk for K3s data
      community.general.lvol:
        vg: "{{ ansible_facts['os_family']|lower + '-vg' | default('ubuntu-vg') }}"
        lv: "k3s-data-lv"
        size: "{{ k3s.storage.data_size }}"
        force: false # never shrink (or remove)
     - name: Format logical volume on system disk for K3s data
       community.general.filesystem:
         fstype: ext4
         dev: "/dev/{{ ansible_facts['os_family']|lower + '-vg' | default('ubuntu-vg') }}/k3s-data-lv"
     - name: Create mountpoint of logical volume for K3s data
       ansible.builtin.file:
         path: "/k3s-data"
         state: directory
         mode: "0755"
     - name: Mount logical volume for K3s data
       ansible.posix.mount:
         path: /k3s-data
         src: "/dev/{{ ansible_facts['os_family']|lower + '-vg' | default('ubuntu-vg') }}/k3s-data-lv"
         fstype: ext4
         state: mounted
     - name: Prepare folders for K3s data
       ansible.builtin.file:
         path: "{{ item.folder }}"
         state: directory
         mode: "0755"
         loop:
           - { folder: "/k3s-data/k3s" }
           - { folder: "/k3s-data/k3s-pods" }
     - name: Prepare folders for K3s data
       ansible.builtin.file:
         src: "{{ item.src }}"
         dest: "{{ item.dest }}"
         state: link
         loop:
           - { src: "/var/lib/rancher/k3s", dest: "/k3s-data/k3s" }
           - { src: "/var/lib/kubelet/pods", dest: "/k3s-data/k3s-pods" }
         # ln -s /datadrive/k3s /var/lib/rancher/k3s
         # ln -s /datadrive/k3s-pods /var/lib/kubelet/pods
         # not done ln -s /datadrive/k3s-run /run/k3s
    - name: Prepare user bashrc for K3s autocomplete
      when: ansible_user is defined
      ansible.builtin.lineinfile:
        path: "~{{ ansible_user }}/.bashrc"
        regexp: '\.\s+<\(k3s completion bash\)'
        line: ". <(k3s completion bash)  # Added by k3s-ansible"

### Download installation sources
# CONDITION: Download installation sources, if:
# a. no K3s has been installed yet (cmd "K3s version" thrown an error)
# b. installed K3s version is older than expected K3s version (var "k3s.version" in cluster's group_vars)
- name: Download installation sources
  when: not ansible_check_mode and (k3s.version_installed is undefined or k3s.version_installed is ansible.builtin.version(k3s.version, '<') )
  become: true
  block:
    - name: Download K3s install script
      ansible.builtin.get_url:
        url: https://get.k3s.io/
        timeout: 120
        dest: /usr/local/bin/k3s-install.sh
        # owner: root
        # group: root
        mode: "0755"    
    - name: Download K3s binaries
      ansible.builtin.command:
        cmd: /usr/local/bin/k3s-install.sh
      environment:
        INSTALL_K3S_SKIP_START: "true"
        INSTALL_K3S_VERSION: "{{ k3s.version }}"
      changed_when: true

### Configure all prerequisites of K3s components
# CONDITION: This block should only be executed if no K3s has been installed yet.
- name: Configure all prerequisites of K3s components
  when: not ansible_check_mode and k3s.version_installed is undefined
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  block:
    - name: Configure prerequistes for K3s network flannel
      ansible.builtin.include_role:
        name: k3s_components
        tasks_from: flannel
      when: k3s.network.addon == "flannel"
    - name: Configure prerequistes for K3s storage local-path-provisioner
      ansible.builtin.include_role:
        name: k3s_components
        tasks_from: local-path-provisioner
      when: '"local" in k3s.storage.provisioners'
    - name: Configure prerequistes for K3s storage longhorn
      ansible.builtin.include_role:
        name: k3s_components
        tasks_from: longhorn
      when: '"longhorn" in k3s.storage.provisioners'
    - name: Configure prerequistes for K3s ingress controller nginx
      ansible.builtin.include_role:
        name: k3s_components
        tasks_from: nginx
      when: k3s.ingress.controller == "nginx"
    - name: Configure prerequistes for K3s loadbalancer kube-vip
      ansible.builtin.include_role:
        name: k3s_components
        tasks_from: kube-vip
      when: k3s.api.loadbalancer == "kube-vip" or k3s.loadbalancer.addon == "kube-vip"



### Install K3s as server
- import_tasks:
  when: k3s.role == 'server' or k3s.role == 'server-strictly' or default?
- name: Copy config values
  ansible.builtin.copy:
     content: "{{ server_config_yaml }}"
     dest: "/etc/rancher/k3s/config.yaml"
     mode: "0644"
  register: _server_config_result
- name: 'Prepare K3s configuration file'
      ansible.builtin.include_role:
        name: k3s_cluster
        tasks_from: k3s_cluster_config
        # check: If 3 or more servers are defined, use HA embedded cluster (https://docs.k3s.io/datastore/ha-embedded)
        # location: /etc/rancher/k3s/config.yaml
        # - name: Setup optional config file
        #   when: server_config_yaml is defined
        #   block:
        #     - name: Make config directory
        #       ansible.builtin.file:
        #         path: "/etc/rancher/k3s"
        #         mode: "0755"
        #         state: directory
        #      - name: Copy config values
        #       ansible.builtin.copy:
        #         content: "{{ server_config_yaml }}"
        #         dest: "/etc/rancher/k3s/config.yaml"
        #         mode: "0644"
        #         register: _server_config_result
        # token: ${k3s_token}
        # data-dir: ${k3s_data_dir}
        # flannel-ipv6-masq: true # https://docs.k3s.io/networking/basic-network-options#dual-stack-ipv4--ipv6-networking
        # cluster-cidr: ${k3s_cluster-cidr}
        # service-cidr: ${k3s_service-cidr}
        # node-cidr-mask-size-ipv4: max /12
        # node-cidr-mask-size-ipv6: max /112
        # if kube-vip in use, than: --tls-san
    - name: 'Prepare K3s basic services manifests'
        # mkdir -p /var/lib/rancher/k3s/server/manifests/
        # https://docs.k3s.io/installation/packaged-components#auto-deploying-manifests-addons
        

- name: 'Install K3s server (first server)'
  when: inventory_hostname == groups[groups | select('match', '^k3s_cluster')][0]
  # INSTALL K3S (but disable service to be able initializing HA cluster)
  # "INSTALL_K3S_SKIP_ENABLE=TRUE INSTALL_K3S_EXEC='server' sh -"      
  # GET K3S KUBECONFIG
  # kubeconfig: /etc/rancher/k3s/k3s.yaml
  # if more than 2 server, than: --cluster-init
  block:
    - name: Copy K3s service file [Single]
      when: groups[server_group] | length == 1 or use_external_database
      ansible.builtin.template:
        src: "k3s-single.service.j2"
        dest: "{{ systemd_dir }}/k3s.service"
        owner: root
        group: root
        mode: "0644"
      register: service_file_single

    - name: Copy K3s service file [HA]
      when:
        - groups[server_group] | length > 1
        - not use_external_database
      ansible.builtin.template:
        src: "k3s-cluster-init.service.j2"
        dest: "{{ systemd_dir }}/k3s.service"
        owner: root
        group: root
        mode: "0644"
      register: service_file_ha

    - name: Add service environment variables
      when: extra_service_envs is defined
      ansible.builtin.lineinfile:
        path: "{{ systemd_dir }}/k3s.service.env"
        line: "{{ item }}"
      with_items: "{{ extra_service_envs }}"

    - name: Delete any existing token from the environment if different from the new one
      ansible.builtin.lineinfile:
        state: absent
        path: "{{ systemd_dir }}/k3s.service.env"
        regexp: "^K3S_TOKEN=\\s*(?!{{ token | default('') | regex_escape }}\\s*$)"

    # Add the token to the environment if it has been provided.
    # Otherwise, let the first server create one on the first run.
    - name: Add token as an environment variable
      no_log: true # avoid logging the server token
      ansible.builtin.lineinfile:
        path: "{{ systemd_dir }}/k3s.service.env"
        line: "K3S_TOKEN={{ token }}"
      when: token is defined

    - name: Restart K3s service
      when:
        - ansible_facts.services['k3s.service'] is defined
        - ansible_facts.services['k3s.service'].state == 'running'
        - service_file_single.changed or service_file_ha.changed or _server_config_result.changed
      ansible.builtin.systemd:
        name: k3s
        daemon_reload: true
        state: restarted

    - name: Enable and check K3s service
      when: ansible_facts.services['k3s.service'] is not defined or ansible_facts.services['k3s.service'].state != 'running'
      ansible.builtin.systemd:
        name: k3s
        daemon_reload: true
        state: started
        enabled: true

    - name: Pause to allow first server startup
      when: (groups[server_group] | length) > 1
      ansible.builtin.pause:
        seconds: 10

    - name: Check whether kubectl is installed on control node
      ansible.builtin.command: 'kubectl'
      register: kubectl_installed
      ignore_errors: true
      delegate_to: 127.0.0.1
      become: false
      changed_when: false

    # Copy the k3s config to a second file to detect changes.
    # If no changes are found, we can skip copying the kubeconfig to the control node.
    - name: Copy k3s.yaml to second file
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /etc/rancher/k3s/k3s-copy.yaml
        mode: "0600"
        remote_src: true
      register: copy_k3s_yaml_file

    - name: Apply K3S kubeconfig to control node
      when:
        - kubectl_installed.rc == 0
        - copy_k3s_yaml_file.changed
      block:
        - name: Copy kubeconfig to control node
          ansible.builtin.fetch:
            src: /etc/rancher/k3s/k3s.yaml
            dest: "{{ kubeconfig }}"
            flat: true

        - name: Change server address in kubeconfig on control node
          ansible.builtin.shell: |
            KUBECONFIG={{ kubeconfig }} kubectl config set-cluster default --server=https://{{ api_endpoint }}:{{ api_port }}
          delegate_to: 127.0.0.1
          become: false
          register: csa_result
          changed_when:
            - csa_result.rc == 0

        - name: Setup kubeconfig context on control node - {{ cluster_context }}
          when: kubeconfig == "~/.kube/config.new"
          ansible.builtin.replace:
            path: "{{ kubeconfig }}"
            regexp: 'default'
            replace: '{{ cluster_context }}'
          delegate_to: 127.0.0.1
          become: false

        - name: Merge with any existing kubeconfig on control node
          when: kubeconfig == "~/.kube/config.new"
          ansible.builtin.shell: |
            TFILE=$(mktemp)
            KUBECONFIG={{ kubeconfig }}:~/.kube/config kubectl config set-context {{ cluster_context }} --user={{ cluster_context }} --cluster={{ cluster_context }}
            KUBECONFIG={{ kubeconfig }}:~/.kube/config kubectl config view --flatten > ${TFILE}
            mv ${TFILE} ~/.kube/config
          delegate_to: 127.0.0.1
          become: false
          register: mv_result
          changed_when:
            - mv_result.rc == 0

    - name: Get the token if randomly generated
      when: token is not defined
      block:
        - name: Wait for token
          ansible.builtin.wait_for:
            path: /var/lib/rancher/k3s/server/token

        - name: Read node-token from master
          ansible.builtin.slurp:
            src: /var/lib/rancher/k3s/server/token
          register: node_token

        - name: Store Master node-token
          ansible.builtin.set_fact:
            token: "{{ node_token.content | b64decode | regex_replace('\n', '') }}"

- name: Start other server if any and verify status
  when:
    - (groups[server_group] | length) > 1
    - inventory_hostname != groups[server_group][0] and ansible_host != groups[server_group][0]
  block:
    - name: Get the token from the first server
      ansible.builtin.set_fact:
        token: "{{ hostvars[groups[server_group][0]].token }}"

    - name: Delete any existing token from the environment if different from the new one
      ansible.builtin.lineinfile:
        state: absent
        path: "{{ systemd_dir }}/k3s.service.env"
        regexp: "^K3S_TOKEN=\\s*(?!{{ token }}\\s*$)"

    - name: Add the token for joining the cluster to the environment
      no_log: true # avoid logging the server token
      ansible.builtin.lineinfile:
        path: "{{ systemd_dir }}/k3s.service.env"
        line: "{{ item }}"
      with_items:
        - "K3S_TOKEN={{ token }}"

    - name: Copy K3s service file [HA]
      when: not use_external_database
      ansible.builtin.template:
        src: "k3s-ha.service.j2"
        dest: "{{ systemd_dir }}/k3s.service"
        owner: root
        group: root
        mode: "0644"
      register: service_file_ha

    - name: Copy K3s service file [External DB]
      when: use_external_database
      ansible.builtin.template:
        src: "k3s-single.service.j2"
        dest: "{{ systemd_dir }}/k3s.service"
        owner: root
        group: root
        mode: "0644"
      register: service_file_external_db

    - name: Restart K3s service
      when:
        - ansible_facts.services['k3s.service'] is defined
        - ansible_facts.services['k3s.service'].state == 'running'
        - service_file_ha.changed or service_file_external_db.changed or _server_config_result.changed
      ansible.builtin.systemd:
        name: k3s
        daemon_reload: true
        state: restarted

    - name: Enable and check K3s service
      when: ansible_facts.services['k3s.service'] is not defined or ansible_facts.services['k3s.service'].state != 'running'
      ansible.builtin.systemd:
        name: k3s
        daemon_reload: true
        state: started
        enabled: true

    - name: Verify that all server nodes joined
      when: not ansible_check_mode and (groups[server_group] | length) > 1
      ansible.builtin.command:
        cmd: >
          k3s kubectl get nodes -l "node-role.kubernetes.io/control-plane=true" -o=jsonpath="{.items[*].metadata.name}"
      register: nodes
      until: nodes.rc == 0 and (nodes.stdout.split() | length) == (groups[server_group] | length)
      retries: 20
      delay: 10
      changed_when: false

- name: Setup kubectl for user
  when: user_kubectl
  block:

    - name: Create directory .kube
      ansible.builtin.file:
        path: ~{{ ansible_user }}/.kube
        state: directory
        owner: "{{ ansible_user }}"
        mode: "u=rwx,g=rx,o="

    - name: Copy config file to user home directory
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ~{{ ansible_user }}/.kube/config
        remote_src: true
        owner: "{{ ansible_user }}"
        mode: "u=rw,g=,o="

    - name: Configure default KUBECONFIG for user
      ansible.builtin.lineinfile:
        path: ~{{ ansible_user }}/.bashrc
        regexp: 'export KUBECONFIG=~/.kube/config'
        line: 'export KUBECONFIG=~/.kube/config # Added by k3s-ansible'
        state: present

    - name: Configure kubectl autocomplete
      ansible.builtin.lineinfile:
        path: ~{{ ansible_user }}/.bashrc
        regexp: '\.\s+<\(kubectl completion bash\)'
        line: ". <(kubectl completion bash)  # Added by k3s-ansible"


  - name: 'Install K3s server (additional server)'
  when: inventory_hostname <> groups[groups | select('match', '^k3s_cluster')][0]
  # INSTALL K3S (but disable service to be able initializing HA cluster)
  # "INSTALL_K3S_SKIP_ENABLE=TRUE INSTALL_K3S_EXEC='server' sh -"      


