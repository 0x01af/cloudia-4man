---
# cloudia-4man (c4m) playbook
# 
# inventory: defines configuration items (ci), or groups of configuration items (gci)
# role: defines configuration tasks for a specific type of configuration item
# playbook: maps roles to ci or cgi
#
# keep in mind:
# - inventory is ordered: first hosts/groups are executed first.
# - roles are ordered: first role will be applied first.
# - playbook are ordered: first playbook definition will be applied first.
# 
# further readings:
# - https://docs.ansible.com/ansible/latest/user_guide/playbooks_reuse_roles.html
# - https://www.digitalocean.com/community/tutorials/how-to-use-ansible-roles-to-abstract-your-infrastructure-environment
# - https://stackoverflow.com/questions/42386801/ansible-how-to-control-the-order-of-the-hosts-when-playbook-is-ran
# - https://stackoverflow.com/questions/42506865/ansible-play-with-hosts-in-order-i-desire
- name: Check cloudia-4man requirements
  hosts: all
  pre_tasks:
    - name: Verify Ansible is version 2.11 or above. (If this fails you may need to update Ansible)
      ansible.builtin.assert:
        that: ansible_version.full is version_compare('2.11', '>=')
        msg: >
          "Ansible is out of date. See here for more info: https://docs.technotim.live/posts/ansible-automation/"

#- import_playbook: plain.yaml
- hosts: plain_servers
  gather_facts: true
  # become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  roles:
    - { role: os_basic, tags: ["os_basic_only"] }

# - import_playbook: k3s.yaml
- hosts: k3s_servers
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  serial: 1
  gather_facts: true
  roles:
    - { role: os_basic, tags: ["os_basic_only"] }
    - role: k3s_server
  post_tasks:
    - name: Inform user about KUBECONFIG environment variable
      ansible.builtin.debug:
        msg: |
          K3s Cluster and Kubeconfig has been set up.\n
          -------------------------------------------\n
          Please install kubectl for managing your K3s cluster:\n
          1. curl -LO 'https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl'\n
          2. install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl\n
          Please check the installation with following commands:\n
          - kubectl get nodes -l 'node-role.kubernetes.io/control-plane=true' -o=jsonpath='{.items[*].metadata.name}'\n
          Remember: Helm Controller is automatically installed.\n

- hosts: k3s_agents
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  gather_facts: true
  roles:
    - { role: os_basic, tags: ["os_basic_only"] }
    - role: k3s_agent

