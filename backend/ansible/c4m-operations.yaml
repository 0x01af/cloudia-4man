---
# cloudia-4man (c4m) operations
# 
# Operations consists of:
# - house keeping: clean-up caches/logs/services/pods/... and restore states
# - observability: check metrics, logs, traces
# - maintenance: check versions of software
# - scaling: check over-/underload
#
# further readings:
# - https://stackoverflow.com/questions/45301295/ansible-task-serial-1-reverse-order
- name: Check cloudia-4man requirements
  hosts: all
  pre_tasks:
    - name: Verify Ansible is version 2.11 or above. (If this fails you may need to update Ansible)
      ansible.builtin.assert:
        that: ansible_version.full is version_compare('2.11', '>=')
        msg: >
          "Ansible is out of date. See here for more info: https://docs.technotim.live/posts/ansible-automation/"

- hosts: admin_nodes:&k3s_cluster
  gather_facts: true
  tasks:
    - name: "Operations for K8s apps"
      ansible.builtin.include_role:
      name: k8s_apps
      tasks_from: operations.yaml
    - name: "Operations for K3s components"
      ansible.builtin.include_role:
      name: k3s_components
      tasks_from: operations.yaml

- hosts: k3s_agents:&k3s_cluster
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  gather_facts: true
  tasks:
    - name: "Operations for K3s agents"
      ansible.builtin.include_role:
        name: k3s_agent
        tasks_from: operations.yaml
    - name: "Operations for OS of K3s agents"
      ansible.builtin.include_role:
        name: os_basic
        tasks_from: operations.yaml

- hosts: k3s_servers
  order: reverse_inventory
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  serial: 1
  gather_facts: true
  tasks:
    - name: "Operations for K3s servers"
      ansible.builtin.include_role:
        name: k3s_server
        tasks_from: operations.yaml
    - name: "Operations for OS of K3s servers
      ansible.builtin.include_role:
        name: os_basic
        tasks_from: operations.yaml

#- import_playbook: plain.yaml
- hosts: plain_servers
  gather_facts: true
  # become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  tasks:
    - name: "Operations for OS of plain_servers
      ansible.builtin.include_role:
        name: os_basic
        tasks_from: operations.yaml

