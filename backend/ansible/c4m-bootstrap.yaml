---
# cloudia-4man (c4m) bootstrap
# 
# inventory: defines configuration items (ci), or groups of configuration items (gci)
# role: defines configuration tasks for a specific type of configuration item
# playbook: maps roles to ci or cgi
#
# keep in mind:
# - inventory is ordered: first hosts/groups are executed first.
# - roles are ordered: first role will be applied first.
# - playbook are ordered: first playbook definition will be applied first.
# 
# further readings:
# - https://docs.ansible.com/ansible/latest/user_guide/playbooks_reuse_roles.html
# - https://www.digitalocean.com/community/tutorials/how-to-use-ansible-roles-to-abstract-your-infrastructure-environment
# - https://stackoverflow.com/questions/42386801/ansible-how-to-control-the-order-of-the-hosts-when-playbook-is-ran
# - https://stackoverflow.com/questions/42506865/ansible-play-with-hosts-in-order-i-desire
- name: Check cloudia-4man requirements
  hosts: admin_nodes
  pre_tasks:
    - name: "Get cloudia-4man requirements for Ansible"
      ansible.builtin.set_fact:
        _c4m_ansible_requirements: "{{ lookup('file', 'requirements.yaml') | from_yaml }}"
    - name: "Ansible: Verify Ansible is version 2.13 or above. (If this fails you may need to update Ansible)"
      ansible.builtin.assert:
        that: "ansible_version.full is version_compare('2.13', '>=')"
        msg: >
          "Ansible is out of date. See here for more info: https://docs.technotim.live/posts/ansible-automation/"
    - name: "Ansible Collections: Get installed collections"
      ansible.builtin.command: ansible-galaxy collection list
      register: _ansible_installed_collections
      changed_when: false
    - name: "Ansible Collections: Validate all collections from requirements.yml"
      ansible.builtin.assert:
        that: "item.name in _ansible_installed_collections.stdout"
        fail_msg: "Collection {{ item.name }} is missing! Run 'ansible-galaxy collection install -r requirements.yaml'."
        success_msg: "Verified: {{ item.name }} is installed."
      loop: "{{ _c4m_ansible_requirements.collections }}"
      loop_control:
        label: "{{ item.name }}"
    - name: "Get cloudia-4man requirements for Python"
      ansible.builtin.set_fact:
        _c4m_ansible_requirements: "{{ lookup('file', '../python/requirements.txt').splitlines() }}"
    - name: "Python Packages: Gather python package facts"
      community.general.pip_package_info:
        clients: ['pip3']
      register: _pip_packages
    - name: "Python Packages: Validate all needed python packages"
      ansible.builtin.assert:
        that: "item in _pip_packages.packages.pip3.keys()"
        fail_msg: "Python library '{{ item }}' not found in pip packages! Run 'pip3 install {{ item }}'"
        success_msg: "Verified: {{ item }} is installed."
      loop: "{{ _c4m_python_requirements }}"
      loop_control:
        label: "{{ item }}"

#- import_playbook: plain.yaml
- hosts: plain_servers
  gather_facts: true
  # become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  roles:
    - { role: os_basic, tags: ["os_basic_only"] }

# - import_playbook: k3s_cluster.yaml
- hosts: k3s_servers
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  serial: 1
  gather_facts: true
  roles:
    - { role: os_basic, tags: ["os_basic_only"] }
    - role: k3s_server
- hosts: k3s_agents:&k3s_cluster
  become: true # run with sudo
  # become_user: root -> run as root (default)
  # ignore_errors: true
  gather_facts: true
  roles:
    - { role: os_basic, tags: ["os_basic_only"] }
    - role: k3s_agent
- hosts: admin_nodes:&k3s_cluster
  gather_facts: true
  roles:
    - { role: admin_tools, tags: ["admin_tools_only"] }
    - role: k3s_components
    - { role: k8s_apps, tags: ["k8s_apps_only"] }

