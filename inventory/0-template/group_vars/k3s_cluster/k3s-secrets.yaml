---
###
# WARNING: This is not for production usage!
###
# In a productive inventory, encrypt this file secrets.yaml by ansible-vault first.
# Afterwards, change all secrets with your own values.
#
# Eg.
# > ansible-vault encrypt secrets.yaml
# > ansible-vault edit secrets.yaml
vault_k3s:
  storage:
    longhorn:
      dashboard:
        username: "longhorn"
        password: "longhorn"
      backup_target:
        access_id: "longhorn" # aws-s3|azure-blob|gcp-storage: api key id; cifs: username
        access_secret: "longhorn" # aws-s3|azure-blob|gcp-storage: api key secret; cifs: password
        
