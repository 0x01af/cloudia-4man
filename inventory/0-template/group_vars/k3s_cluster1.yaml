---

# Configuration of K3s Cluster <k3s_cluster1>
k3s:
  # K3s release
  version: v1.32.3+k3s1
  # K3s server token
  token: "k3s_cluster1"
  api:
    loadbalancer: kube-vip # none | external | kube-vip (if kube-vip, please define parameters under section "loadbalancer")
    endpoint: "k3s-cluster1.mesh.local" # if loadbalancer = "none", than first server in environment will be used ("{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}")
  # Networking:
  networking:
    cluster-cidr: 10.42.0.0/16,2001:cafe:42::/56
    service-cidr: 10.43.0.0/16,2001:cafe:43::/112
    addons: flannel # none
    flannel:
      # which interface should be used to talk with other cluster members
      iface: "enp1s0" # -> flannel-iface
      # if dual-stack, than define IPv4 and IPv6 subnets separated by comma ',' (https://docs.k3s.io/networking/basic-network-options#dual-stack-ipv4--ipv6-networking)
      node-cidr-mask-size-ipv4:
      node-cidr-mask-size-ipv6:
  storage:
    provisioners:
      - local
      - longhorn
    local:
      # Local Path Provisionier: https://github.com/rancher/local-path-provisioner/blob/master/README.md#usage
      data-path: /opt/local-path-provisioner
    longhorn:
      version: v1.8.1
      # Longhorn Storage: https://longhorn.io/docs/1.8.1/references/settings/#default-data-path
      data-path: /var/lib/longhorn
  ingress:
    # An ingress controller routes traffic based on requested URI to the right pod/container.
    # K3s default: traefik
    # Recommandation: use NGINX as ingress and reverse-proxy with OWASP
    # Read more:
    # - https://kubernetes.github.io/ingress-nginx/user-guide/third-party-addons/modsecurity/)
    # - https://blog.opensight.ch/zerotrust-kubernetes-nginx-ingress-hardening-mit-mod_security-waf-und-owasp-crs/
    controller: nginx # nginx | traefik
    nginx:
      version: v0.0.0
  loadbalancer:
    # A load balancer expose services, which could be routed and handled by ingress controller, to the external world.
    # K3s default: servicelb
    # Recommandation: use Kube-VIP as (real) load balancer for services AND control plane
    # Read more:
    # - https://kube-vip.io/
    # - https://github.com/k3s-io/k3s/discussions/9255
    use: kube-vip # kube-vip | metallb | servicelb
    kube-vip:
      # https://kube-vip.io/docs/usage/k3s/ / https://kube-vip.io/docs/installation/daemonset/)
      version: v0.4.0
      api-iface: "enp0s0"
      api-vip: 192.168.1.10
      lb-range: 192.168.123.130-192.168.123.139
    # metallb:
    #  vip: 192.168.123.130-192.168.123.139
      
